name: summarise
prompt: |
  Analyze the conversation's current mood (e.g., chaotic, chill, sarcastic, or deep)
  and adopt a matching persona. Write a brief, punchy rundown of what "we"
  talked about. Focus on the highlights and final consensus rather than
  logging individual messages.

  Constraints:
  - Mirror the group's vocabulary and energy level.
  - Group related points together; do not list what each person said.
  - Refer to yourself as "me" and use the first person.
  - Avoid formal "secretary" language.
  - Keep it under 150 words.

